name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: echo "Application built successfully"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: Production-test

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: echo "Deploying to Production..."
